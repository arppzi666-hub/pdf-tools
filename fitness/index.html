<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>健身教练助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#e8f0f8,#dce6f0);min-height:100vh;color:#1e293b}
.container{max-width:520px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:20px 18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .15s}
.card h3{font-size:15px;font-weight:700;margin:0 0 14px 0;color:#1e293b;display:flex;align-items:center;gap:6px}
input,select{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;margin:0 0 8px 0;background:#f8fafc;box-sizing:border-box;transition:border .2s}
input:focus,select:focus{outline:none;border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
button{border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
button:active{transform:scale(.97)}
.btn{padding:14px 18px;width:100%}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.3)}
.btn-orange{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 2px 8px rgba(217,119,6,.3)}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.3)}
.btn-outline{background:#fff;border:2px solid #3b82f6;color:#3b82f6}
.btn-sm{padding:8px 14px;font-size:12px;width:auto}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.bg-green{background:#d1fae5;color:#065f46}
.bg-orange{background:#fef3c7;color:#92400e}
.bg-red{background:#fee2e2;color:#991b1b}
.row{display:flex;gap:8px;align-items:center}
.row-bw{display:flex;justify-content:space-between;align-items:center}
.col{flex:1}
.stats{display:flex;gap:10px;margin-bottom:16px}
.stat{flex:1;background:#fff;border-radius:16px;padding:18px 10px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat:nth-child(1)::before{background:#10b981}.stat:nth-child(2)::before{background:#3b82f6}.stat:nth-child(3)::before{background:#f59e0b}.stat:nth-child(4)::before{background:#ef4444}
.stat-n{font-size:32px;font-weight:800;letter-spacing:-1px}
.stat-l{font-size:11px;color:#94a3b8;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tab{flex:1;padding:12px 8px;text-align:center;background:#fff;border-radius:12px;font-size:13px;cursor:pointer;border:2px solid transparent;transition:all .15s;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tab.on{background:#2563eb;color:#fff;border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.25)}
.tab:hover:not(.on){border-color:#bfdbfe}
.lr{padding:14px 0;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
.lr:last-child{border-bottom:none}
.sub{font-size:13px;color:#94a3b8}.tc{text-align:center}.mt8{margin-top:8px}.mt12{margin-top:12px}.mb12{margin-bottom:12px}
.login{max-width:380px;margin:60px auto 0;padding:24px;text-align:center}
.login .icon{font-size:56px;margin-bottom:4px}
.login h1{font-size:22px;font-weight:800;margin:4px 0 24px;color:#1e293b}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;font-size:12px}
.cal-cell{padding:10px 4px;border-radius:10px;cursor:pointer;transition:all .15s}
.cal-cell:hover{background:#f1f5f9}
.cal-cell.has{background:#d1fae5;color:#065f46;font-weight:700}
.cal-cell.has:hover{background:#a7f3d0}
.cal-dot{font-size:9px;margin-top:2px}
</style></head>
<body><div id="app"></div>
<script>
var BID='6a2bd1c9f5f4af5e29e5530a',BKEY='$2a$10$r0eMfqvul.BF5Af53eOtuOaqsfZEIHj93Q3Ri2AMnGYy9YeqFEgnG';
var K='fc5',_cache=null;
function R(){if(_cache)return _cache;try{var raw=localStorage.getItem(K);if(raw)_cache=JSON.parse(raw);}catch(e){}if(!_cache)_cache={s:[],c:[],l:[],p:'123456'};return _cache}
function W(d){_cache=d;localStorage.setItem(K,JSON.stringify(d));fetch('https://api.jsonbin.io/v3/b/'+BID,{method:'PUT',headers:{'X-Master-Key':BKEY,'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){})}
// Load from cloud first, then render
fetch('https://api.jsonbin.io/v3/b/'+BID+'/latest',{headers:{'X-Master-Key':BKEY}}).then(function(r){return r.json()}).then(function(j){var d=j.record;_cache=d;localStorage.setItem(K,JSON.stringify(d))}).catch(function(){}).finally(function(){go()});
function id(){return Date.now()+'_'+Math.random().toString(36).substr(2,6)}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dd(a,b){return Math.floor((new Date(b)-new Date(a))/86400000)}
function td2(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

var pg='login',tab='dash',sp='',sday='';

function go(){
  try{doGo()}catch(e){document.getElementById('app').innerHTML='<div class="login"><div class="icon">!</div><h1>Error</h1><div class="sub">'+e.message+'</div><button class="btn btn-outline mt12" onclick="localStorage.clear();location.reload()">Reset</button></div>'}
}
function doGo(){
  var d=R(),o='';
  if(pg=='login')o=loginUI();
  else if(pg=='coach')o=coachUI(d);
  else if(pg=='student')o=stuUI(d);
  document.getElementById('app').innerHTML=o;
}

function loginUI(){
  return'<div class="login"><div class="icon">💧</div><h1>健身教练助手</h1>'+
  '<div class="card" style="text-align:left"><h3>👤 学员登录</h3><input id="spIn" type="tel" placeholder="手机号码" maxlength="11"><button class="btn btn-blue mt8" onclick="sLogin()">查看课程卡</button><div class="sub tc mt8" id="sm"></div></div>'+
  '<div class="card" style="text-align:left"><h3>🔒 教练后台</h3><input id="cpIn" type="password" placeholder="教练密码"><button class="btn btn-outline mt8" onclick="cLogin()">进入后台</button><div class="sub tc mt8" id="cm"></div></div></div>';
}

function coachUI(d){
  var s=d.s||[],t=td();
  var ac=s.filter(function(x){return x.st=='active';}),ps=s.filter(function(x){return x.st=='paused';});
  var ck=d.c.filter(function(x){return x.date==t;});
  var es=ac.filter(function(x){return x.type=='monthly'&&x.days-dd(x.start||t,t)<=7;});

  var o='<div class="container"><div class="row-bw mb12"><div style="font-size:20px;font-weight:700">💧 教练后台</div><button class="btn btn-sm btn-outline" onclick="pg=\'login\';go()">退出</button></div>';
  o+='<div class="tabs"><div class="tab '+(tab=='dash'?'on':'')+'" onclick="tab=\'dash\';go()">📊 概况</div><div class="tab '+(tab=='list'?'on':'')+'" onclick="tab=\'list\';go()">👥 学员</div><div class="tab '+(tab=='add'?'on':'')+'" onclick="tab=\'add\';go()">+ 添加</div><div class="tab '+(tab=='cal'?'on':'')+'" onclick="tab=\'cal\';go()">📅 日历</div><div class="tab '+(tab=='pause'?'on':'')+'" onclick="tab=\'pause\';go()">⏸ 请假</div></div>';

  if(tab=='dash'){
    o+='<div class="stats"><div class="stat"><div class="stat-n" style="color:#27ae60">'+ac.length+'</div><div class="stat-l">活跃学员</div></div><div class="stat"><div class="stat-n">'+ck.length+'</div><div class="stat-l">今日签到</div></div><div class="stat"><div class="stat-n" style="color:#e67e22">'+es.length+'</div><div class="stat-l">即将到期</div></div><div class="stat"><div class="stat-n" style="color:#e74c3c">'+s.filter(function(x){return x.st=='expired'}).length+'</div><div class="stat-l">已过期</div></div></div>';
    if(es.length){o+='<div class="card"><h3>即将到期</h3>';for(var i=0;i<es.length;i++){var x=es[i],r=x.days-dd(x.start||t,t);o+='<div class="lr"><div><strong>'+x.name+'</strong><span class="sub"> '+x.phone+'</span></div><span class="badge bg-red">'+r+'天</span><button class="btn btn-sm btn-green" onclick="extend(\''+x.id+'\')">续期</button></div>'}o+='</div>';}
    o+='<div class="card"><h3>今日签到 '+ck.length+'人</h3>';
    for(var i=0;i<ck.length;i++){var c=ck[i],st=s.find(function(v){return v.id==c.sid});o+='<div class="lr"><span>'+(st?st.name:'?')+'</span><span class="badge bg-green">已签到</span></div>'}
    if(!ck.length)o+='<div class="sub tc">暂无</div>';o+='</div>';
  }
  else if(tab=='list'){
    for(var i=0;i<s.length;i++){var x=s[i],r=x.type=='monthly'?Math.max(0,x.days-dd(x.start||t,t)):(x.sessions||0)-(x.used||0);
    var bg=x.st=='active'?'bg-green':x.st=='paused'?'bg-orange':'bg-red';
    var bt=x.st=='active'?'进行中':x.st=='paused'?'已暂停':'已过期';
    o+='<div class="card"><div class="row-bw"><div><strong>'+x.name+'</strong><span class="sub"> '+x.phone+'</span></div><span class="badge '+bg+'">'+bt+'</span></div>';
    o+='<div class="sub mt8">'+(x.type=='monthly'?'包月 · '+r+'天 / '+x.days+'天':'次卡 · '+r+'次 / '+(x.sessions||0)+'次')+' · ¥'+(x.price||0)+' · '+(x.start||'')+'</div>';
    o+='<div class="row mt8">';
    if(x.st=='active')o+='<button class="btn btn-sm btn-orange" onclick="indPause(\''+x.id+'\')">请假</button><button class="btn btn-sm btn-green" onclick="ckin(\''+x.id+'\')">签到</button>';
    if(x.st=='paused')o+='<button class="btn btn-sm btn-green" onclick="indResume(\''+x.id+'\')">恢复</button>';
    o+='<button class="btn btn-sm btn-outline" onclick="ec(\''+x.id+'\')">改卡</button><button class="btn btn-sm btn-red" onclick="delS(\''+x.id+'\')">删除</button></div></div>'}
    if(!s.length)o+='<div class="card sub tc">暂无学员，点"添加"</div>';
  }
  else if(tab=='add'){
    o+='<div class="card"><h3>添加学员</h3>';
    o+='<input id="an" placeholder="姓名"><input id="ap" type="tel" placeholder="手机号" maxlength="11">';
    o+='<div class="row"><select id="at" class="col"><option value="monthly">包月卡</option><option value="session">次卡</option></select>';
    o+='<input id="ad" type="number" placeholder="天数/次数" class="col" value="30"><input id="ar" type="number" placeholder="价格" class="col"></div>';
    o+='<button class="btn btn-blue mt8" onclick="addS()">保存</button></div>';
  }
  else if(tab=='cal'){
    var now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
    var fday=new Date(yr,mo,1).getDay(),lday=new Date(yr,mo+1,0).getDate();
    var mn=yr+'-'+String(mo+1).padStart(2,'0');
    var cc={};
    d.c.forEach(function(x){if(x.date&&x.date.startsWith(mn)){cc[x.date]=cc[x.date]||[];cc[x.date].push(x.sid)}});
    o+='<div class="card"><h3>📅 '+yr+'年'+(mo+1)+'月</h3>';
    o+='<div class="cal-grid">';
    var hd=['日','一','二','三','四','五','六'];
    for(var i=0;i<7;i++)o+='<div style="color:#94a3b8;font-size:11px;padding:8px 0">'+hd[i]+'</div>';
    for(var i=0;i<fday;i++)o+='<div></div>';
    for(var d2=1;d2<=lday;d2++){
      var dt=mn+'-'+String(d2).padStart(2,'0'),cnt=cc[dt]?cc[dt].length:0;
      o+='<div class="cal-cell'+(cnt>0?' has':'')+'" onclick="showDay(\''+dt+'\')"><div>'+d2+'</div>'+(cnt>0?'<div class="cal-dot">'+cnt+'人</div>':'')+'</div>';
    }
    o+='</div></div>';
    if(sday){
      var sd=sday,names=cc[sd]||[];
      o+='<div class="card"><h3>'+sd+' 签到详情 ('+names.length+'人)</h3>';
      names.forEach(function(sid2){var st=s.find(function(v){return v.id==sid2});if(st)o+='<div class="lr"><span>'+st.name+'</span><span class="sub">'+st.phone+'</span></div>'});
      o+='<button class="btn btn-sm btn-outline mt8" onclick="this.parentElement.parentElement.querySelector(\'.card:last-child\').style.display=\'none\'">关闭</button></div>';
    }
  }
  else if(tab=='pause'){
    o+='<div class="card"><h3>集体操作</h3><div class="row"><button class="btn btn-orange col" onclick="gp()">⏸ 集体请假</button><button class="btn btn-green col" onclick="gr()">▶ 集体恢复</button></div></div>';
    o+='<div class="card"><h3>暂停中</h3>';
    for(var i=0;i<ps.length;i++)o+='<div class="lr"><span><strong>'+ps[i].name+'</strong><span class="sub"> '+ps[i].phone+'</span></span><button class="btn btn-sm btn-green" onclick="indResume(\''+ps[i].id+'\')">恢复</button></div>';
    if(!ps.length)o+='<div class="sub tc">无</div>';o+='</div>';
    o+='<div class="card"><h3>本月请假记录</h3>';
    var lv=d.l.filter(function(l){return l.create&&l.create.substring(0,7)==td().substring(0,7);});
    for(var i=0;i<lv.length;i++){var st=s.find(function(v){return v.id==lv[i].sid});o+='<div class="lr"><span>'+(st?st.name:'全员')+'<span class="sub">'+(lv[i].type=='group'?'集体':'个人')+' · '+lv[i].create+'</span></span></div>'}
    if(!lv.length)o+='<div class="sub tc">无</div>';o+='</div>';
  }
  o+='</div>';return o;
}

function stuUI(d){
  var s=d.s.find(function(x){return x.phone==sp});
  if(!s)return'<div class="container" style="padding-top:60px"><div class="card tc"><div style="font-size:40px">😿</div><div style="font-size:16px;margin-top:10px">未找到学员</div><div class="sub mt8">手机号：'+sp+'</div><button class="btn btn-outline mt12" onclick="pg=\'login\';go()">返回</button></div></div>';
  var r=s.type=='monthly'?Math.max(0,s.days-dd(s.start||td(),td())):(s.sessions||0)-(s.used||0);
  var td3=td(),ck=d.c.some(function(x){return x.sid==s.id&&x.date==td3});
  var ml=d.l.filter(function(x){return x.sid==s.id&&x.create&&x.create.substring(0,7)==td().substring(0,7)}).length,mxl=2;
  var o='<div class="container"><div class="row-bw mb12"><div style="font-size:20px;font-weight:700">👤 '+s.name+'</div><button class="btn btn-sm btn-outline" onclick="pg=\'login\';go()">退出</button></div>';
  o+='<div class="card tc"><div class="sub">'+(s.type=='monthly'?'包月卡':'次卡')+' · '+(s.st=='active'?'进行中':s.st=='paused'?'已暂停':'已过期')+'</div>';
  o+='<div style="font-size:50px;font-weight:800;margin:8px 0;color:'+(s.st=='active'?'#27ae60':'#e67e22')+'">'+r+'<span style="font-size:16px">'+(s.type=='monthly'?'天':'次')+'</span></div>';
  o+='<div class="sub">总'+(s.type=='monthly'?'天数':'次数')+'：'+(s.type=='monthly'?s.days+'天':(s.sessions||0)+'次')+' · ¥'+(s.price||0)+' · '+(s.start||'')+'</div></div>';
  if(s.st=='active'){o+='<div class="row"><button class="btn btn-green col" '+(ck?'disabled':'')+' onclick="ckin(\''+s.id+'\')">'+(ck?'今日已签到':'✅ 打卡签到')+'</button><button class="btn btn-orange col" '+(ml>=mxl||ck?'disabled':'')+' onclick="sl(\''+s.id+'\')">📝 请假 ('+ml+'/'+mxl+')</button></div>';if(ml>=mxl)o+='<div class="sub tc mt8">本月请假次数已用完</div>';if(ck)o+='<div class="sub tc mt8">今日已签到，不可请假</div>'}
  o+='</div>';return o;
}

function cLogin(){var d=R();if(document.getElementById('cpIn').value==d.p){pg='coach';go()}else document.getElementById('cm').textContent='密码错误'}
function sLogin(){var p=document.getElementById('spIn').value.trim();if(R().s.some(function(x){return x.phone==p})){sp=p;pg='student';go()}else document.getElementById('sm').textContent='未找到该号码'}
function addS(){var d=R(),n=document.getElementById('an').value.trim();if(!n)return;var ph=document.getElementById('ap').value.trim(),tp=document.getElementById('at').value,nd=parseInt(document.getElementById('ad').value)||30,pr=parseFloat(document.getElementById('ar').value)||0;d.s.push({id:id(),name:n,phone:ph,type:tp,days:tp=='monthly'?nd:0,sessions:tp=='session'?nd:0,used:0,price:pr,start:td(),st:'active'});W(d);go()}
var _cklock=null;
function ckin(sid){if(_cklock==sid)return;_cklock=sid;var d=R(),s=d.s.find(function(x){return x.id==sid});if(!s)return;var t3=td();if(d.c.some(function(x){return x.sid==sid&&x.date==t3})){_cklock=null;return};if(s.type=='monthly'){var ws=new Date(t3);ws.setDate(ws.getDate()-ws.getDay());var we=new Date(ws);we.setDate(we.getDate()+7);if(d.c.filter(function(x){return x.sid==sid&&x.date>=td2(ws)&&x.date<td2(we)}).length>=4)return}if(s.type=='session'&&(s.sessions-(s.used||0))<=0)return;s.used=(s.used||0)+1;d.c.push({id:id(),sid:sid,date:t3});if(s.type=='monthly'&&dd(s.start,t3)>=s.days)s.st='expired';if(s.type=='session'&&(s.sessions-s.used)<=0)s.st='expired';W(d);_cklock=null;go()}
function indPause(sid){var d=R(),r=prompt('请假原因：','教练操作');if(!r)return;d.l.push({id:id(),sid:sid,type:'individual',create:td(),reason:r});var s=d.s.find(function(x){return x.id==sid});if(s)s.st='paused';W(d);go()}
function indResume(sid){var d=R(),s=d.s.find(function(x){return x.id==sid});if(s)s.st='active';W(d);go()}
function gp(){var r=prompt('集体请假原因：','节假日休息');if(!r)return;var d=R();d.l.push({id:id(),sid:'',type:'group',create:td(),reason:r});d.s.forEach(function(x){if(x.st=='active')x.st='paused'});W(d);go()}
function gr(){var d=R();d.s.forEach(function(x){if(x.st=='paused')x.st='active'});W(d);go()}
function sl(sid){var d=R(),t3=td();if(d.c.some(function(x){return x.sid==sid&&x.date==t3})){alert('今日已签到，不能请假');return}if(d.l.filter(function(x){return x.sid==sid&&x.create&&x.create.substring(0,7)==t3.substring(0,7)}).length>=2){alert('本月请假次数已用完');return}var r=prompt('请假原因：','身体不适');if(!r)return;d.l.push({id:id(),sid:sid,type:'individual',create:t3,reason:r});var s=d.s.find(function(x){return x.id==sid});if(s)s.st='paused';W(d);go()}
function extend(sid){var d=R(),s=d.s.find(function(x){return x.id==sid});if(s){s.start=td();s.st='active';W(d);go()}}
function showDay(dt){sday=dt;go()}
function ec(sid){var d=R(),s=d.s.find(function(x){return x.id==sid});if(!s)return;var nd=prompt(s.type=='monthly'?'修改天数（当前'+s.days+'天）：':'修改次数（当前'+s.sessions+'次）：',s.type=='monthly'?s.days:s.sessions);if(nd!==null){var v=parseInt(nd);if(v>0){if(s.type=='monthly')s.days=v;else{s.sessions=v;s.used=Math.min(s.used,v)}s.st='active';W(d);go()}}}
function delS(sid){if(confirm('确认删除该学员？')){var d=R();d.s=d.s.filter(function(x){return x.id!=sid});d.c=d.c.filter(function(x){return x.sid!=sid});d.l=d.l.filter(function(x){return x.sid!=sid});W(d);go()}}
go();
</script></body></html>
